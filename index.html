<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社内イントラDX</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=20">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<section class="pricing">
<h2>プラン</h2>

<div class="plans">

<!-- LIGHT -->
<div class="plan" onclick="showFeatures('light')">
<h3>ライト</h3>
<h1>30,000円</h1>
<ul>
<li>勤怠管理</li>
<li>社内チャット</li>
<li>カレンダー</li>
<li>通知機能</li>
</ul>
<p class="more">もっと見る</p>
</div>

<!-- STANDARD -->
<div class="plan recommended" onclick="showFeatures('standard')">
<div class="badge">おすすめ</div>
<h3>スタンダード</h3>
<h1>50,000円</h1>
<ul>
<li>勤怠管理</li>
<li>社内チャット</li>
<li>社内報</li>
<li>カレンダー</li>
<li>AI日報</li>
<li>通知機能</li>
<li>メンバー管理</li>
<li>連絡先管理</li>
<li>緊急連絡先</li>
</ul>
<p class="more">もっと見る</p>
</div>

</div>
</section>

<!-- ✅ FEATURES SECTION (SEPARATE) -->
<section class="features" id="featuresSection">
<h2>主な機能</h2>

<div class="feature-grid" id="featureGrid"></div>

</section>

<!-- CONTACT -->
<section class="contact">
<h2>お問い合わせ</h2>

<form action="mailto:shiela.concepcion@gbi.co.jp" method="POST" enctype="text/plain">
<input placeholder="会社名" required>
<input type="email" placeholder="メール" required>
<textarea placeholder="内容" required></textarea>
<button>送信</button>
</form>

</section>

<script>
function showFeatures(plan){

const grid = document.getElementById("featureGrid");
const section = document.getElementById("featuresSection");

let features = {
light: [
["fa-clock","勤怠管理"],
["fa-comments","社内チャット"],
["fa-calendar","カレンダー"],
["fa-bell","通知機能"]
],
standard: [
["fa-clock","勤怠管理"],
["fa-comments","社内チャット"],
["fa-newspaper","社内報"],
["fa-calendar","カレンダー"],
["fa-robot","AI日報"],
["fa-bell","通知機能"],
["fa-users","メンバー管理"],
["fa-address-book","連絡先管理"],
["fa-shield-halved","緊急連絡先"]
]
};

grid.innerHTML = "";

features[plan].forEach(f=>{
grid.innerHTML += `
<div class="feature-card">
<i class="fa-solid ${f[0]}"></i>
<p>${f[1]}</p>
</div>`;
});

section.style.display = "block";
section.scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
