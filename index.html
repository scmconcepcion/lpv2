<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>社内イントラDX - Minimal</title>

<link rel="stylesheet" href="style2.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>


<body>


<!-- NAV -->

<header class="nav">

<h3>Intranet DX</h3>

<button>お問い合わせ</button>

</header>



<!-- HERO -->

<section class="hero">

<h1>

社内業務をシンプルに

</h1>

<p>

必要な情報を1つにまとめて
業務効率を向上

</p>

<button>

無料で相談する

</button>

</section>



<!-- FEATURES -->

<section class="features">

<h2>主な機能</h2>

<div class="grid">


<div class="card">
<i class="fa-solid fa-clock"></i>
<p>勤怠管理</p>
</div>

<div class="card">
<i class="fa-solid fa-comments"></i>
<p>チャット</p>
</div>

<div class="card">
<i class="fa-solid fa-calendar"></i>
<p>カレンダー</p>
</div>

<div class="card">
<i class="fa-solid fa-robot"></i>
<p>AI日報</p>
</div>

<div class="card">
<i class="fa-solid fa-bell"></i>
<p>通知</p>
</div>

<div class="card">
<i class="fa-solid fa-users"></i>
<p>メンバー管理</p>
</div>

</div>

</section>



<!-- OPTION -->

<section class="options">

<h2>オプションサービス</h2>

<div class="option-list">

<p>・Excel / Word ワンポイント講座</p>

<p>・Wi-Fi環境改善サポート</p>

</div>

</section>



<!-- PRICING -->

<section class="pricing">

<h2>料金プラン</h2>

<div class="plans">


<div class="plan">

<h3>ライト</h3>
<h1>30,000円</h1>

</div>


<div class="plan recommended">

<p class="badge">おすすめ</p>

<h3>スタンダード</h3>
<h1>50,000円</h1>

<p>全機能対応</p>

</div>


</div>

</section>



<!-- CONTACT -->

<section class="contact">

<h2>お問い合わせ</h2>

<input placeholder="会社名">
<input placeholder="メール">
<textarea placeholder="内容"></textarea>

<button>送信</button>

</section>



<footer>

© 2026 Intranet DX

</footer>


</body>

</html>
